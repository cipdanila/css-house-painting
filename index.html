<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Painting</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="house">
        <div id="chimney">
            <div class="smoke smoke1"></div>
            <div class="smoke smoke2"></div>
            <div class="smoke smoke3"></div>
        </div>
        <div id="roof"></div>
        <div class="window-hole" id="window-1-hole">
            <div id="window-1"></div>
        </div>
        <div class="window-hole" id="window-2-hole">
            <div id="window-2"></div>
        </div>
        <div class="door-hole">
            <div id="door"></div>
        </div>
        <div id="welcome">WELCOME</div>
    </div>
</body>
</html>
